# Configuração do Cloud Build para CI/CD
# Usado para builds automatizados no Google Cloud
# Compatível com Cloud Code e GitHub Actions

# Opções globais do build
options:
  # Usar máquina mais potente para builds mais rápidos
  machineType: 'N1_HIGHCPU_8'
  # Disco maior para cache e dependências
  diskSizeGb: '100'
  # Logs estruturados
  logging: CLOUD_LOGGING_ONLY
  # Pool de workers (opcional, requer configuração prévia)
  # pool:
  #   name: 'projects/$PROJECT_ID/locations/us-central1/workerPools/my-pool'

# Variáveis de substituição
substitutions:
  _SERVICE_NAME: 'nossa-maternidade-web'
  _REGION: 'us-central1'
  _PLATFORM: 'managed'
  _MEMORY: '512Mi'
  _MAX_INSTANCES: '10'
  _TIMEOUT: '300'

steps:
  # ============================================
  # Step 1: Build da aplicação web (Expo)
  # ============================================
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "📦 Installing dependencies..."
        apk add --no-cache python3 make g++ git curl
        npm install -g pnpm@9
        
        echo "📚 Installing project dependencies..."
        pnpm install --frozen-lockfile
        
        echo "🏗️  Building web version..."
        pnpm run build:web
        
        echo "✅ Web build complete!"
        ls -la dist/
    id: 'build-web'
    timeout: '900s'

  # ============================================
  # Step 2: Build da imagem Docker
  # ============================================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BRANCH_NAME'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--build-arg'
      - 'NODE_ENV=production'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'
    id: 'build-image'
    waitFor: ['build-web']
    timeout: '600s'

  # ============================================
  # Step 3: Push das imagens para GCR
  # ============================================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
    id: 'push-image-sha'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BRANCH_NAME'
    id: 'push-image-branch'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
    id: 'push-image-latest'
    waitFor: ['build-image']

  # ============================================
  # Step 4: Deploy no Cloud Run
  # ============================================
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🚀 Deploying to Cloud Run..."
        gcloud run deploy ${_SERVICE_NAME} \
          --image gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA \
          --region ${_REGION} \
          --platform ${_PLATFORM} \
          --allow-unauthenticated \
          --memory ${_MEMORY} \
          --max-instances ${_MAX_INSTANCES} \
          --timeout ${_TIMEOUT} \
          --set-env-vars "EXPO_PUBLIC_SUPABASE_URL=https://mnszbkeuerjcevjvdqme.supabase.co" \
          --set-secrets "EXPO_PUBLIC_SUPABASE_ANON_KEY=supabase-anon-key:latest,EXPO_PUBLIC_GEMINI_API_KEY=gemini-api-key:latest" \
          --quiet
        
        echo "✅ Deploy complete!"
        
        SERVICE_URL=$(gcloud run services describe ${_SERVICE_NAME} --region ${_REGION} --format='value(status.url)')
        echo "🌐 Service URL: $SERVICE_URL"
    id: 'deploy-cloud-run'
    waitFor: ['push-image-sha', 'push-image-branch', 'push-image-latest']
    timeout: '600s'

# Imagens a serem armazenadas
images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BRANCH_NAME'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

# Timeout global do build
timeout: '1800s'

# Tags para organização
tags: ['nossa-maternidade', 'expo-web', 'cloud-run']


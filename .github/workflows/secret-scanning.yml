name: 🔒 Secret Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Executa diariamente às 2h UTC
    - cron: '0 2 * * *'

jobs:
  scan:
    name: Scan for exposed secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history para scan completo
      
      - name: 🔍 Run TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch || 'main' }}
          head: HEAD
          extra_args: --json --only-verified
      
      - name: 🚨 Fail if secrets found
        if: failure()
        run: |
          echo "::error::Secrets detectados no código! Revise o output acima."
          exit 1
      
      - name: ✅ No secrets found
        if: success()
        run: echo "✅ Nenhum secret detectado no código!"


name: Android Submit to Google Play

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      build_id:
        description: 'EAS Build ID to submit'
        required: true
        type: string

jobs:
  submit:
    name: Submit to Google Play
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Setup Google Play Service Account
        run: |
          if [ -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}" ]; then
            echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}" > google-play-service-account.json
            echo "✅ Service account key configurado"
          else
            echo "⚠️  GOOGLE_PLAY_SERVICE_ACCOUNT secret não configurado"
            exit 1
          fi

      - name: Submit to Google Play
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            eas submit --platform android \
              --profile production \
              --latest \
              --non-interactive
          else
            # Submit latest build from tag
            eas submit --platform android \
              --profile production \
              --latest \
              --non-interactive
          fi
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## 🚀 Release Android
            
            Build enviado automaticamente para Google Play Store.
            
            **Tag**: ${{ github.ref }}
            **Commit**: ${{ github.sha }}
            
            ### Próximos Passos
            1. Verificar status na [Google Play Console](https://play.google.com/console)
            2. Monitorar reviews e feedback
            3. Verificar métricas de instalação
          draft: false
          prerelease: false


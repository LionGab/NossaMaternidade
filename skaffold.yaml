# Skaffold configuration for Cloud Code
# This file enables Cloud Code to manage builds, deployments, and debugging

apiVersion: skaffold/v4beta7
kind: Config
metadata:
  name: nossa-maternidade-web

# Build configuration
build:
  artifacts:
    - image: nossa-maternidade-web
      context: .
      docker:
        dockerfile: Dockerfile
        buildArgs:
          NODE_ENV: production
      # Sincronização de arquivos para desenvolvimento rápido
      sync:
        manual:
          - src: 'src/**/*.tsx'
            dest: /app/src
          - src: 'src/**/*.ts'
            dest: /app/src
  # Usar Google Cloud Build ou Docker local
  googleCloudBuild:
    projectId: PROJECT_ID
    machineType: N1_HIGHCPU_8
    timeout: 1200s
    diskSizeGb: 100
    logStreamingOption: STREAM_ON
  
  # Alternativa: usar Docker local
  # local:
  #   push: true
  #   useBuildkit: true

# Deploy configuration for Cloud Run
deploy:
  cloudrun:
    projectid: PROJECT_ID
    region: us-central1

# Profiles para diferentes ambientes
profiles:
  # Profile de desenvolvimento local
  - name: local
    activation:
      - command: dev
    build:
      local:
        push: false
        useBuildkit: true
    deploy:
      cloudrun:
        projectid: PROJECT_ID
        region: us-central1

  # Profile de staging/homologação
  - name: staging
    build:
      googleCloudBuild:
        projectId: PROJECT_ID
        machineType: N1_HIGHCPU_8
    deploy:
      cloudrun:
        projectid: PROJECT_ID
        region: us-central1
    patches:
      - op: replace
        path: /deploy/cloudrun/region
        value: us-east1

  # Profile de produção
  - name: production
    build:
      googleCloudBuild:
        projectId: PROJECT_ID
        machineType: N1_HIGHCPU_32
        timeout: 1800s
    deploy:
      cloudrun:
        projectid: PROJECT_ID
        region: us-central1
    patches:
      - op: add
        path: /build/artifacts/0/docker/cacheFrom
        value:
          - gcr.io/PROJECT_ID/nossa-maternidade-web:latest

  # Profile para debug
  - name: debug
    build:
      local:
        push: false
        useBuildkit: true
    deploy:
      cloudrun:
        projectid: PROJECT_ID
        region: us-central1

# Port forwarding para desenvolvimento
portForward:
  - resourceType: service
    resourceName: nossa-maternidade-web
    port: 8080
    localPort: 3000

# Verify configuration
verify:
  - name: nossa-maternidade-web
    container:
      name: nossa-maternidade-web
      image: nossa-maternidade-web
      command: ["/bin/sh"]
      args: ["-c", "curl -f http://localhost:8080/ || exit 1"]
